<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Enterprise Logistics Portal</title>
</head>

<body class="bg-gray-50 text-slate-900 font-sans">
    <header class="bg-white border-b border-gray-200 px-8 py-4 flex justify-between items-center sticky top-0 z-10">
        <div class="flex items-center space-x-10">
            <span class="text-xl font-black text-blue-700 tracking-tighter italic">DELIVERYPRO</span>
            <nav class="flex space-x-6 text-sm font-medium text-slate-500">
                <a href="#" class="text-blue-600 border-b-2 border-blue-600 pb-5 pt-1">Dashboard</a>
                <a href="#" class="hover:text-slate-800 pb-5 pt-1">Repartidores</a>
                <a href="#" class="hover:text-slate-800 pb-5 pt-1">Envíos Pendientes</a>
                <a href="#" class="hover:text-slate-800 pb-5 pt-1">Configuración</a>
            </nav>
        </div>
        <div class="flex items-center space-x-4">
            <div class="bg-gray-100 p-2 rounded-full">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-slate-500" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
                </svg>
            </div>
            <img src="https://ui-avatars.com/api/?name=Admin+User&background=0D8ABC&color=fff"
                class="w-8 h-8 rounded-full border border-gray-200">
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-8">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-2xl font-bold text-slate-800">Vista General de Repartidores</h2>
            <div class="flex space-x-2">
                <input type="text" placeholder="Buscar por ID o Nombre..."
                    class="border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 w-64">
                <button
                    class="bg-white border border-gray-300 text-slate-700 px-4 py-2 rounded-lg text-sm font-medium hover:bg-gray-50">Exportar
                    CSV</button>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
                <div class="flex justify-between items-start mb-4">
                    <div class="flex items-center space-x-3">
                        <div
                            class="w-12 h-12 bg-blue-50 rounded-lg flex items-center justify-center text-blue-600 font-bold">
                            AG</div>
                        <div>
                            <h3 class="font-semibold text-slate-800">Ana Gutiérrez</h3>
                            <p class="text-xs text-slate-400">ID: REP-10293</p>
                        </div>
                    </div>
                    <span
                        class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-green-100 text-green-800">
                        <span class="w-1.5 h-1.5 rounded-full bg-green-500 mr-1.5"></span> Activa
                    </span>
                </div>
                <div class="space-y-3 pt-4 border-t border-gray-50">
                    <div class="flex justify-between text-sm">
                        <span class="text-slate-500">Carga Actual</span>
                        <span class="font-semibold italic">14 / 20 paquetes</span>
                    </div>
                    <div class="flex justify-between text-sm">
                        <span class="text-slate-500">Zona</span>
                        <span class="font-semibold">Centro Histórico</span>
                    </div>
                </div>
                <button
                    class="w-full mt-6 bg-slate-50 border border-gray-200 py-2 rounded-lg text-sm font-medium text-slate-600 hover:bg-slate-100 transition">Ver
                    Ruta en Mapa</button>
            </div>

            <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 opacity-60">
                <div class="flex justify-between items-start mb-4">
                    <div class="flex items-center space-x-3">
                        <div
                            class="w-12 h-12 bg-gray-50 rounded-lg flex items-center justify-center text-gray-400 font-bold">
                            JS</div>
                        <div>
                            <h3 class="font-semibold text-slate-800">Juan Sánchez</h3>
                            <p class="text-xs text-slate-400">ID: REP-10294</p>
                        </div>
                    </div>
                    <span
                        class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-gray-100 text-gray-600">
                        <span class="w-1.5 h-1.5 rounded-full bg-gray-400 mr-1.5"></span> Offline
                    </span>
                </div>
                <div class="space-y-3 pt-4 border-t border-gray-50 text-slate-400">
                    <div class="flex justify-between text-sm italic">
                        Sin actividad registrada hoy
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>

</html>
