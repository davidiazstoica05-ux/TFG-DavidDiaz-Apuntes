<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>index</title>
</head>

<body>

    <h1>Envíos</h1>
    <table>

        <thead>
            <tr>
                <th>codigo envío</th>
                <th>direccion</th>
                <th>peso</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="envio:${envios}">
                <td th:text="${envio.codigo_envio}"></td>
                <td th:text="${envio.direccion}"></td>
                <td th:text="${envio.peso}"></td>
            </tr>
        </tbody>




    </table>

</body>

</html>
