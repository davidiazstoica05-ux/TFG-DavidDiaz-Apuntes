<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Tienda DAM - Catálogo</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
	<link th:href="@{/css/style.css}" rel="stylesheet" />
	<style>
		/* Ajuste específico para que el sidebar no se pegue al navbar */
		body {
			padding-top: 70px;
		}

		.sidebar {
			min-height: calc(100vh - 70px);
			background-color: white;
			border-right: 1px solid #dee2e6;
		}

		.nav-link {
			color: #333;
		}

		.nav-link:hover {
			background-color: #f8f9fa;
		}

		.nav-link.active {
			background-color: #0d6efd;
			color: white !important;
		}
	</style>
</head>

<body>

	<nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
		<div class="container-fluid">
			<a class="navbar-brand" href="/"><i class="bi bi-shop me-2"></i>Triana Shop</a>
		</div>
	</nav>

	<div class="container-fluid">
		<div class="row">
			<nav class="col-md-3 col-lg-2 d-md-block sidebar collapse">
				<div class="position-sticky pt-3">

					<h6
						class="sidebar-heading d-flex justify-content-between align-items-center px-3 mt-4 mb-1 text-muted text-uppercase">
						<span>Categorías</span>
					</h6>
					<ul class="nav flex-column mb-4">
						<li class="nav-item">
							<a class="nav-link" th:href="@{/}"
								th:classappend="${param.idCategoria == null} ? 'active' : ''">
								<i class="bi bi-grid-fill me-2"></i> Todas
							</a>
						</li>
						<li class="nav-item" th:each="cat : ${categorias}">
							<a class="nav-link" th:href="@{/?(idCategoria=${cat.id})}"
								th:classappend="${param.idCategoria != null and param.idCategoria[0] == cat.id.toString()} ? 'active' : ''">
								<i class="bi bi-tag me-2"></i> <span th:text="${cat.nombre}">Nombre</span>
							</a>
						</li>
					</ul>

					<h6
						class="sidebar-heading d-flex justify-content-between align-items-center px-3 mt-4 mb-1 text-muted text-uppercase">
						<span>Administración</span>
					</h6>
					<ul class="nav flex-column mb-2">
						<li class="nav-item">
							<a class="nav-link text-primary" th:href="@{/admin/producto/}">
								<i class="bi bi-box-seam me-2"></i> Gestionar Productos
							</a>
						</li>
						<li class="nav-item">
							<a class="nav-link text-primary" th:href="@{/admin/categoria/}">
								<i class="bi bi-folder2-open me-2"></i> Gestionar Categorías
							</a>
						</li>
					</ul>
				</div>
			</nav>

			<main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">
				<div
					class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
					<h1 class="h2">Nuestros Productos</h1>
				</div>

				<div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-xl-4 g-4 mb-5">
					<div class="col" th:each="producto : ${productos}">
						<div class="card h-100 shadow-sm col-item">
							<img th:src="${#strings.isEmpty(producto.imagen)} ? 'https://upload.wikimedia.org/wikipedia/commons/thumb/6/65/No-Image-Placeholder.svg/1920px-No-Image-Placeholder.svg.png?utm_source=commons.wikimedia.org&utm_campaign=index&utm_content=thumbnail' : ${producto.imagen}"
								class="card-img-top" style="height: 200px; object-fit: cover;" alt="producto">

							<div class="card-body d-flex flex-column">
								
								
<!-- 
	Uso de expresión de #Strings para cortar la cantidad de caracteres que se muestran, 
	al ser el nombre de nuestro producto muy largo, 
	se acorta a 65 caracteres como máximo (solo para mostrarlo) mediante el método
	abbreviate al que se le puede dar el máximo de caracteres que queremos mostrar 
-->
								
								<h5 class="card-title text-truncate" th:text="${#strings.abbreviate(producto.nombre,65)}">Nombre</h5>

								<p class="card-text product-description text-muted small"
									th:text="${producto.descripcion}">
									Descripción del producto...
								</p>

								<div class="mt-auto">
									<div class="d-flex justify-content-between align-items-center mb-2">
										<span class="fs-4 fw-bold text-dark"
											th:text="${producto.descuento == 0} ? ${#numbers.formatCurrency(producto.pvp)} : ${#numbers.formatCurrency(producto.pvp * (1 - producto.descuento))}">
											0.00€
										</span>
										<span class="badge bg-danger" th:if="${producto.descuento > 0}"
											th:text="'-' + ${#numbers.formatPercent(producto.descuento, 1, 0)}">
											-10%
										</span>
									</div>
									
<!--
	Las puntuaciones no se gestionan
-->

									<div class="mb-3 text-warning">
										<i th:each="i : ${#numbers.sequence(1, 5)}"
											th:class="${i <= producto.getPuntuacionMedia()} ? 'bi bi-star-fill' : 'bi bi-star'"></i>
									</div>

									<a th:href="@{/product/{id}(id=${producto.id})}"
										class="btn btn-outline-primary w-100">
										Ver detalles
									</a>
								</div>
							</div>
						</div>
					</div>
				</div>
			</main>
		</div>
	</div>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
