<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>index</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>


<body class="bg-primary text-warning">


    <div class="table table-striped text-center container mt-5 w-25">
        <h1 class="text-center mt-5 p-4"> Productos </h1>
        <table>
            <thead>
                <th class="p-2">Nombre</th>
                <th>Precio</th>
            </thead>
            <tbody>
                <tr th:each="producto : ${productos}">
                    <td class="p-4" th:text="${producto.nombre}">Nombre del producto</td>
                    <td class="p-4" th:text="${#numbers.formatCurrency(producto.precio)}">Precio del producto</td>
                </tr>
            </tbody>
        </table>
    </div>



</body>

</html>
